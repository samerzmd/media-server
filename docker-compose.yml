services:
  qbittorrent:
    image: ghcr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    ports:
      - "8080:8080"  # Web UI
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Riyadh
      - WEBUI_PORT=8080
    volumes:
      - /mnt/storage/qbittorrent:/downloads
      - ./qbittorrent_config:/config
    networks:
      - media_network

  sonarr:
    image: ghcr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    ports:
      - "8989:8989"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Riyadh
    volumes:
      - /mnt/storage/media/TV Shows:/media/tv
      - /mnt/storage/qbittorrent:/downloads
      - ./sonarr_config:/config
    networks:
      - media_network

  radarr:
    image: ghcr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    ports:
      - "7878:7878"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Riyadh
    volumes:
      - /mnt/storage/media/Movies:/media/movies
      - /mnt/storage/qbittorrent:/downloads
      - ./radarr_config:/config
    networks:
      - media_network

  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Riyadh
    volumes:
      - /mnt/storage/qbittorrent:/downloads
      - ./prowlarr_config:/config
    networks:
      - media_network

  bazarr:
    image: ghcr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    ports:
      - "6767:6767"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Riyadh
    volumes:
      - /mnt/storage/media/Movies:/media/movies
      - /mnt/storage/media/TV Shows:/media/tv
      - /mnt/storage/media:/media
      - /mnt/storage/qbittorrent:/downloads
      - ./bazarr_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6767 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - media_network

  subgenai:
    depends_on:
      bazarr:
        condition: service_healthy
    image: mccloud/subgen:cpu
    container_name: subgenai
    volumes:
      - './subgen/models:/subgen/models'
      - './subgen/subgen.env:/subgen/subgen.env:ro'
    environment:
      LOG_LEVEL: debug
      NAME_SERVERS: 9.9.9.9
      PROCADDEDMEDIA: false
      PROCMEDIAONPLAY: false
      PLEXTOKEN: ""
      PLEXSERVER: ""
      CONCURRENT_TRANSCRIPTIONS: 2
      USE_PATH_MAPPING: false
      MODEL_PATH: ./models
    ports:
      - "9000:9000"
    networks:
      - media_network

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"  # HTTP Web UI
      - "8920:8920"  # HTTPS Web UI (optional)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Riyadh
    volumes:
      - /mnt/storage/media:/media
      - ./jellyfin_config:/config
      - ./jellyfin_cache:/cache
    networks:
      - media_network

  nginx_proxy_manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx_proxy_manager
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP
      - "81:81"    # Admin UI
      - "443:443"  # HTTPS
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Riyadh
    volumes:
      - ./nginx_data:/data
      - ./nginx_letsencrypt:/etc/letsencrypt
    networks:
      - media_network

  readarr:
    image: ich777/readarr:latest
    container_name: readarr
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Riyadh
    volumes:
      - /mnt/storage/media/Books:/media/books
      - /mnt/storage/qbittorrent:/downloads
      - ./readarr_config:/config
    networks:
      - media_network
  
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Riyadh
    volumes:
      - /mnt/storage/media/Books:/books
      - ./calibre-web_config:/config
    networks:
      - media_network


  commandarr:
    image: samerzmd/commandarr:latest
    container_name: commandarr
    environment:
      TELEGRAM_TOKEN: $BOT_TOKEN
      SONARR_URL: sonarr
      SONARR_API_KEY: $SONARR_API_KEY
      RADARR_URL: radarr
      RADARR_API_KEY: $RADARR_API_KEY

  recommendarr:
    build: ./recommendarr
    image: recommendarr:local
    container_name: recommendarr
    restart: unless-stopped
    depends_on:
      - jellyfin
      - radarr
      - sonarr
    ports:
      - "8089:5000"   # review/approve dashboard
    environment:
      # Web dashboard (review & approve). Scheduler off = no automatic adds.
      ENABLE_WEB: "true"
      ENABLE_SCHEDULER: "false"
      WEB_PORT: 5000
      # Service URLs use the compose service names on media_network
      JELLYFIN_URL: http://jellyfin:8096
      JELLYFIN_API_KEY: $JELLYFIN_API_KEY
      # Optional: comma-separated Jellyfin user IDs (empty = all users)
      JELLYFIN_USER_IDS: $JELLYFIN_USER_IDS
      TMDB_API_KEY: $TMDB_API_KEY
      RADARR_URL: http://radarr:7878
      RADARR_API_KEY: $RADARR_API_KEY
      RADARR_ROOT_FOLDER: /media/movies
      SONARR_URL: http://sonarr:8989
      SONARR_API_KEY: $SONARR_API_KEY
      SONARR_ROOT_FOLDER: /media/tv
      # Behavior
      MAX_MOVIE_ADDS: 5
      MAX_TV_ADDS: 3
      MIN_VOTE_AVERAGE: 6.0
      MIN_VOTE_COUNT: 100
      SEARCH_ON_ADD: "true"
      # UI is review/approve, so the Add button is the safety gate -> DRY_RUN off.
      # Set "true" to make Add buttons (and any scheduler) only simulate.
      DRY_RUN: "false"
      RUN_INTERVAL_SECONDS: 86400
      TZ: Asia/Riyadh
    volumes:
      - ./recommendarr_data:/data
    networks:
      - media_network

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Riyadh
    volumes:
      - /mnt/storage:/srv
      - ./filebrowser_config:/config
      - ./filebrowser_database/database.db:/database.db
    networks:
      - media_network
  
  openvpn-as:
    image: kylemanna/openvpn:latest
    container_name: openvpn-as
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - MKNOD
    devices:
      - /dev/net/tun
    ports:
      - "943:943"         # Admin Web UI (unchanged)
      - "9443:443"        # OpenVPN TCP over HTTPS — remapped from 443 to 9443
      - "1194:1194/udp"   # OpenVPN UDP
    volumes:
      - ./openvpn_as_data:/openvpn  # Persistent config data
    environment:
      - TZ=Asia/Riyadh
    networks:
      - media_network


networks:
  media_network:
    driver: bridge
